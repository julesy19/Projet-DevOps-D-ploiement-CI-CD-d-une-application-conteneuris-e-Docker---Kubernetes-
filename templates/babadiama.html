<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des prix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 40px;
        }

        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav a {
            margin: 10px;
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-price {
            background: #2a5298;
        }

        .btn-dashboard {
            background: #1e3c72;
        }

        .nav a:hover {
            opacity: 0.85;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #4CAF50;
            color: white;
        }

        th, td {
            padding: 14px 12px;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
            transition: 0.2s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        th {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .price {
            font-weight: bold;
            color: #2e7d32;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .cat-tech { background: #2196F3; }
        .cat-food { background: #FF9800; }
        .cat-clothes { background: #9C27B0; }

    </style>
</head>

<body>

<div class="nav">
    <a href="/price" class="btn-price">💰 Voir les prix</a>
    <a href="/index" class="btn-dashboard">🌍 Dashboard</a>
</div>

<div class="container">
    <h1>💰 Liste des prix des produits</h1>

    <table>
        <thead>
            <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Origine</th>
                <th>Prix ($)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ordinateur portable</td>
                <td><span class="badge cat-tech">Tech</span></td>
                <td>USA</td>
                <td class="price">1200</td>
            </tr>

            <tr>
                <td>Riz</td>
                <td><span class="badge cat-food">Alimentaire</span></td>
                <td>Inde</td>
                <td class="price">25</td>
            </tr>

            <tr>
                <td>T-shirt</td>
                <td><span class="badge cat-clothes">Vêtements</span></td>
                <td>Chine</td>
                <td class="price">15</td>
            </tr>

            <tr>
                <td>Smartphone</td>
                <td><span class="badge cat-tech">Tech</span></td>
                <td>Corée du Sud</td>
                <td class="price">900</td>
            </tr>

            <tr>
                <td>Café</td>
                <td><span class="badge cat-food">Alimentaire</span></td>
                <td>Brésil</td>
                <td class="price">10</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
